<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT CTF - Enquete Numerique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Boot -->
    <div id="boot-screen">
        <div id="boot-lines"></div>
    </div>

    <!-- Lock Screen -->
    <div id="lock-screen" style="display:none;">
        <div id="lock-time"></div>
        <div id="lock-date"></div>
        <div id="lock-user-area">
            <div id="lock-avatar">&#128100;</div>
            <div id="lock-username">Detective</div>
            <input type="password" id="lock-password" placeholder="Mot de passe...">
            <div id="lock-hint">Hint : le numero du 112 en France</div>
            <div id="lock-error"></div>
        </div>
        <div id="lock-footer">
            <span>Enquete OSINT v2.0</span>
            <span>&#9889;</span>
        </div>
    </div>

    <!-- Desktop -->
    <div id="desktop" style="display:none;">
        <div id="top-panel">
            <div class="panel-left">
                <span class="panel-app-name">Activities</span>
            </div>
            <div class="panel-center">
                <span id="panel-clock"></span>
            </div>
            <div class="panel-right">
                <span class="panel-icon">&#128266;</span>
                <span class="panel-icon">&#9889;</span>
            </div>
        </div>

        <div id="dock">
            <div class="dock-item" data-app="browser" title="Google Chrome">
                <div class="dock-icon chrome-icon">&#127760;</div>
            </div>
            <div class="dock-item" data-app="terminal" title="Terminal">
                <div class="dock-icon terminal-icon">>&nbsp;</div>
            </div>
            <div class="dock-item" data-app="notes" title="Notes">
                <div class="dock-icon notes-icon">&#128221;</div>
            </div>
        </div>

        <div id="desktop-icons">
            <div class="desktop-icon" data-app="dossier">
                <div class="desktop-icon-img folder-icon">&#128193;</div>
                <span>Dossier Suspect</span>
            </div>
            <div class="desktop-icon" data-app="browser">
                <div class="desktop-icon-img chrome-icon">&#127760;</div>
                <span>Google</span>
            </div>
            <div class="desktop-icon" data-app="terminal">
                <div class="desktop-icon-img terminal-icon">>&nbsp;</div>
                <span>Terminal</span>
            </div>
        </div>

        <div id="windows-container"></div>

        <div id="context-menu">
            <div class="ctx-item" data-action="browser">Ouvrir Google</div>
            <div class="ctx-separator"></div>
            <div class="ctx-item" data-action="terminal">Ouvrir le Terminal</div>
        </div>

        <!-- Fake Google -->
        <div id="google-overlay" style="display:none;">
            <div class="google-page">
                <div class="google-sidebar" id="google-sidebar">
                    <div class="sidebar-header">
                        <span>&#128269; FICHE ENQUETE</span>
                        <span id="sidebar-toggle">&#9660;</span>
                    </div>
                    <div class="sidebar-score">
                        SCORE: <span id="score-display">100</span> / 100
                    </div>
                    <div class="sidebar-body" id="sidebar-body">
                        <div class="sidebar-section">
                            <div class="sidebar-title">Identite</div>
                            <div id="info-identite" class="sidebar-items"></div>
                        </div>
                        <div class="sidebar-section">
                            <div class="sidebar-title">Contact</div>
                            <div id="info-contact" class="sidebar-items"></div>
                        </div>
                        <div class="sidebar-section">
                            <div class="sidebar-title">Reseaux Sociaux</div>
                            <div id="info-reseaux" class="sidebar-items"></div>
                        </div>
                        <div class="sidebar-section">
                            <div class="sidebar-title">Emploi</div>
                            <div id="info-emploi" class="sidebar-items"></div>
                        </div>
                        <div class="sidebar-section">
                            <div class="sidebar-title">Vehicule</div>
                            <div id="info-vehicule" class="sidebar-items"></div>
                        </div>
                        <div class="sidebar-section">
                            <div class="sidebar-title">Divers</div>
                            <div id="info-divers" class="sidebar-items"></div>
                        </div>
                        <div class="sidebar-section">
                            <div class="sidebar-title">Erreurs</div>
                            <div id="info-erreurs" class="sidebar-items error-items"></div>
                        </div>
                    </div>
                    <div class="sidebar-footer">
                        <div id="progress-bar"><div id="progress-fill"></div></div>
                        <div id="progress-text">0 / 20 infos</div>
                    </div>
                </div>
                <div class="google-main">
                    <div class="google-logo">
                        <span style="color:#4285f4">G</span><span style="color:#ea4335">o</span><span style="color:#fbbc05">o</span><span style="color:#4285f4">g</span><span style="color:#34a853">l</span><span style="color:#ea4335">e</span>
                    </div>
                    <div class="google-search-bar">
                        <input type="text" id="google-input" placeholder="Rechercher sur Google..." autofocus>
                        <button id="google-search-btn">&#128269;</button>
                    </div>
                    <div id="google-results"></div>
                    <div id="google-close">&#10005;</div>
                </div>
            </div>
        </div>

        <div id="notifications"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
