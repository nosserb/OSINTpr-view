<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF Ubuntu Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <div id="top-panel">
            <div class="panel-left">
                <span class="panel-app-name">Activities</span>
            </div>
            <div class="panel-center">
                <span id="panel-clock"></span>
            </div>
            <div class="panel-right">
                <span class="panel-icon">&#128266;</span>
                <span class="panel-icon">&#128246;</span>
                <span class="panel-icon">&#9889;</span>
                <span class="panel-icon" id="panel-power">&#9211;</span>
            </div>
        </div>
        <div id="dock">
            <div class="dock-item" data-app="terminal" title="Terminal">
                <div class="dock-icon terminal-icon">>&nbsp;</div>
            </div>
            <div class="dock-item" data-app="files" title="Files">
                <div class="dock-icon files-icon">&#128193;</div>
            </div>
            <div class="dock-item" data-app="browser" title="Firefox">
                <div class="dock-icon browser-icon">&#127760;</div>
            </div>
            <div class="dock-item" data-app="text" title="Text Editor">
                <div class="dock-icon text-icon">&#128221;</div>
            </div>
            <div class="dock-item" data-app="settings" title="Settings">
                <div class="dock-icon settings-icon">&#9881;</div>
            </div>
            <div class="dock-separator"></div>
            <div class="dock-item" data-app="show-apps" title="Show Applications">
                <div class="dock-icon apps-icon">&#8943;</div>
            </div>
        </div>
        <div id="desktop-icons">
            <div class="desktop-icon" data-app="terminal">
                <div class="desktop-icon-img terminal-icon">>&nbsp;</div>
                <span>Terminal</span>
            </div>
            <div class="desktop-icon" data-app="readme">
                <div class="desktop-icon-img readme-icon">&#128196;</div>
                <span>README.txt</span>
            </div>
            <div class="desktop-icon" data-app="flag">
                <div class="desktop-icon-img flag-icon">&#127988;</div>
                <span>flag.txt</span>
            </div>
        </div>
        <div id="windows-container"></div>
        <div id="context-menu">
            <div class="ctx-item" data-action="terminal">Ouvrir le Terminal</div>
            <div class="ctx-separator"></div>
            <div class="ctx-item" data-action="new-folder">Nouveau dossier</div>
            <div class="ctx-item" data-action="paste">Coller</div>
            <div class="ctx-separator"></div>
            <div class="ctx-item" data-action="open-terminal">Ouvrir un terminal ici</div>
            <div class="ctx-separator"></div>
            <div class="ctx-item" data-action="settings">Paramètres d'affichage</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
