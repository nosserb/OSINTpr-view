<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF Ubuntu Desktop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <div id="top-panel">
            <div class="panel-left">
                <span class="panel-app-name">Activities</span>
            </div>
            <div class="panel-center">
                <span id="panel-clock"></span>
            </div>
            <div class="panel-right">
                <span class="panel-icon">&#128266;</span>
                <span class="panel-icon">&#128246;</span>
                <span class="panel-icon">&#9889;</span>
                <span class="panel-icon" id="panel-power">&#9211;</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
